<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111716" />
  <title>BINARIO TO GAME - Simulatore Armamento Ferroviario</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="simRoot" class="sim-root" aria-label="BINARIO TO GAME">
    <canvas id="simCanvas" aria-label="Simulatore ferroviario professionale"></canvas>

    <section class="hud top-hud" aria-label="Stato simulazione">
      <button id="hudToggle" class="hud-button" type="button">HUD</button>
      <div class="mission-strip">
        <span id="clockText">06:30</span>
        <strong>BINARIO TO GAME</strong>
        <small id="weatherText">meteo variabile</small>
      </div>
      <div class="contract-strip">
        <span>Appalto RFI-042</span>
        <strong id="jobPhaseText">preparazione cantiere</strong>
      </div>
    </section>

    <section id="instrumentPanel" class="instrument-panel" aria-label="Strumenti mezzo">
      <header>
        <span id="roleText">Ruolo: caposquadra</span>
        <strong id="vehicleNameText">Escavatore gomma/rotaia</strong>
      </header>
      <div class="instrument-grid">
        <p><span>Velocita</span><strong id="speedText">0.0 km/h</strong></p>
        <p><span>Motore</span><strong id="engineText">spento</strong></p>
        <p><span>Idraulica</span><strong id="hydraulicText">0 bar</strong></p>
        <p><span>Aderenza</span><strong id="gripText">100%</strong></p>
        <p><span>Allineamento</span><strong id="alignmentText">0 mm</strong></p>
        <p><span>Ballast</span><strong id="ballastText">stabile</strong></p>
      </div>
      <div class="mini-map" aria-label="GPS ferroviario">
        <canvas id="miniMapCanvas"></canvas>
      </div>
    </section>

    <section class="objective-panel" aria-label="Obiettivi di lavoro">
      <div>
        <span>Sequenza tecnica</span>
        <strong id="objectiveText">Avvia il mezzo e porta l'escavatore sul binario 2.</strong>
      </div>
      <div class="progress-line">
        <span id="progressFill"></span>
      </div>
      <ol id="taskList" class="task-list"></ol>
    </section>

    <section class="fleet-panel" aria-label="Flotta mezzi">
      <button class="fleet-button active" type="button" data-vehicle="excavator">Escavatore</button>
      <button class="fleet-button" type="button" data-vehicle="vaiacar">Vaiacar</button>
      <button class="fleet-button" type="button" data-vehicle="tamper">Rincalzatrice</button>
    </section>

    <section class="control-panel" aria-label="Comandi mezzo">
      <div class="joystick" id="joystick" aria-label="Joystick movimento">
        <button type="button" data-dir="forward" aria-label="Avanti"></button>
        <button type="button" data-dir="right" aria-label="Destra"></button>
        <button type="button" data-dir="reverse" aria-label="Indietro"></button>
        <button type="button" data-dir="left" aria-label="Sinistra"></button>
        <span id="joyKnob"></span>
      </div>
      <div class="action-grid">
        <button id="enterButton" class="action-button primary" type="button">SALI / SCENDI</button>
        <button id="engineButton" class="action-button" type="button">MOTORE</button>
        <button id="railGearButton" class="action-button" type="button">RUOTE FERRO</button>
        <button id="toolButton" class="action-button primary" type="button">LAVORA</button>
        <button id="cameraButton" class="action-button" type="button">CAM</button>
        <button id="radioButton" class="action-button" type="button">RADIO</button>
      </div>
    </section>

    <aside id="radioLog" class="radio-log" aria-label="Radio cantiere"></aside>
    <div id="toast" class="toast" role="status"></div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
